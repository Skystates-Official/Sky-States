<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="50%" stop-color="#1e1b4b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Rounded Base Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />
  
  <!-- Outer glowing accent ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="url(#logoGrad)" stroke-width="6" opacity="0.4" />
  
  <!-- Modern Geometric SS Emblem (Sky States upward chevrons) -->
  <g transform="translate(136, 120)" filter="url(#glow)">
    <!-- Lower Chevron -->
    <path d="M 0 160 L 120 270 L 240 160 L 200 120 L 120 190 L 40 120 Z" fill="url(#logoGrad)" />
    <!-- Upper Chevron -->
    <path d="M 0 80 L 120 190 L 240 80 L 200 40 L 120 110 L 40 40 Z" fill="url(#logoGrad)" />
    <!-- Glowing core node representing AI/Technology -->
    <circle cx="120" cy="115" r="16" fill="#ffffff" />
  </g>
</svg>
