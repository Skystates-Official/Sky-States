services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skystates-us-web
    restart: unless-stopped
    ports:
      - "3082:4321"
    volumes:
      - ./src/data:/app/src/data
      - ./data.db:/app/data.db
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4321/site-check.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
